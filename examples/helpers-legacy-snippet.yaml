# Optional / historisch:
# Nur noetig, wenn du die Scripts aus scripts-legacy-snippet.yaml verwenden
# oder eigene Standard-Lovelace-Karten statt der Custom Card bauen moechtest.

input_number:
  essen_jahr:
    name: Essen Jahr
    min: 2024
    max: 2035
    step: 1
    mode: box
  essen_kw:
    name: Essen KW
    min: 1
    max: 53
    step: 1
    mode: box
  essen_neue_klasse:
    name: Essen neue Klasse
    min: 1
    max: 4
    step: 1
    mode: slider
  essen_gericht_id:
    name: Essen Gericht ID
    min: 1
    max: 500
    step: 1
    mode: box
  essen_update_klasse:
    name: Essen Update Klasse
    min: 1
    max: 4
    step: 1
    mode: slider

input_text:
  essen_neues_gericht:
    name: Essen neues Gericht
    max: 120
  essen_gericht_fuer_tag:
    name: Essen Gericht fuer Tag
    max: 120
  essen_update_name:
    name: Essen Update Name
    max: 120

input_select:
  essen_tag:
    name: Essen Tag
    options:
      - Montag
      - Dienstag
      - Mittwoch
      - Donnerstag
      - Freitag
      - Samstag
      - Sonntag
